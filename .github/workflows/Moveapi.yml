name: API Promotion Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  promote-to-nonprod:
    runs-on: ubuntu-latest
    environment: non-prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Health Check DEV Gateway
        run: |
          echo "Checking DEV Gateway Health..."
          curl -fS -X GET "http://${{ secrets.HOST_DEV }}:5555/rest/apigateway/health" \
            -u "${{ secrets.DEV_USERNAME }}:${{ secrets.DEV_PASSWORD }}"
          echo ""
          echo "DEV Gateway is UP"

      - name: Health Check NON-PROD Gateway
        run: |
          echo "Checking NON-PROD Gateway Health..."
          curl -fS -X GET "http://${{ secrets.HOST_NONPROD }}:5555/rest/apigateway/health" \
            -u "${{ secrets.NONPROD_USERNAME }}:${{ secrets.NONPROD_PASSWORD }}"
          echo ""
          echo "NON-PROD Gateway is UP"

      - name: Export API Archive from DEV
        run: |
          echo "Exporting Fulltest_Cus v1.0.0 from DEV..."
          curl -fS -X POST "http://${{ secrets.HOST_DEV }}:5555/rest/apigateway/archive" \
            -u "${{ secrets.DEV_USERNAME }}:${{ secrets.DEV_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/zip" \
            -H "x-HTTP-Method-Override: GET" \
            -d '{
                  "types": ["api"],
                  "condition": "and",
                  "scope": [
                    { "attributeName": "apiName", "keyword": "Fulltest_Cus" },
                    { "attributeName": "apiVersion", "keyword": "1.0.0" }
                  ]
                }' \
            --output api_archive.zip

      - name: Validate Exported Archive
        run: |
          echo "Validating exported file..."
          file api_archive.zip
          ls -lh api_archive.zip
          unzip -t api_archive.zip

      - name: Import API Archive to NON-PROD
        run: |
          echo "Importing archive to NON-PROD..."
          curl -fS -X POST \
            "http://${{ secrets.HOST_NONPROD }}:5555/rest/apigateway/archive?overwrite=*&preserveAssetState=true" \
            -u "${{ secrets.NONPROD_USERNAME }}:${{ secrets.NONPROD_PASSWORD }}" \
            -H "Accept: application/json" \
            -F "zipFile=@api_archive.zip;type=application/zip"